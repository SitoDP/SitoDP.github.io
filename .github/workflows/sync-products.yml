name: Sync Fender Design Products

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run sync:products

      - name: Commit & push if catalog changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/products.json src/data/collections.json
          if git diff --cached --quiet; then
            echo "No catalog changes"
          else
            git commit -m "chore: sync Fender Design products catalog"
            git push
          fi
